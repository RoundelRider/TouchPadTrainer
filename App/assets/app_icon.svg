<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <!-- Active pad glow -->
    <radialGradient id="glow_green" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#69FF47"/>
      <stop offset="100%" stop-color="#00C853"/>
    </radialGradient>
    <!-- Inactive pad gradient -->
    <linearGradient id="pad_idle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3949AB"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <!-- Lit white pad gradient -->
    <radialGradient id="glow_white" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0BEC5"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Glow filter for active pad -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="44" ry="44" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="252" height="252" rx="42" ry="42"
        fill="none" stroke="#5C6BC0" stroke-width="1.5" opacity="0.5"/>

  <!-- 4x4 pad grid — 16 pads
       Grid area: x 28–228, y 28–228 → cell size 50px, gap 8px
       Cell outer: 50px  Cell inner (pad): 42px, corner-radius 8 -->

  <!-- Row 0 -->
  <!-- Pad 0,0 — idle -->
  <rect x="28"  y="28"  width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 0,1 — idle -->
  <rect x="78"  y="28"  width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 0,2 — idle -->
  <rect x="128" y="28"  width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 0,3 — idle -->
  <rect x="178" y="28"  width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>

  <!-- Row 1 -->
  <!-- Pad 1,0 — idle -->
  <rect x="28"  y="78"  width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 1,1 — ACTIVE GREEN (hero pad) -->
  <rect x="78"  y="78"  width="42" height="42" rx="8" fill="url(#glow_green)" filter="url(#glow)"/>
  <!-- Pad 1,2 — lit white (secondary) -->
  <rect x="128" y="78"  width="42" height="42" rx="8" fill="url(#glow_white)" filter="url(#shadow)" opacity="0.55"/>
  <!-- Pad 1,3 — idle -->
  <rect x="178" y="78"  width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>

  <!-- Row 2 -->
  <!-- Pad 2,0 — idle -->
  <rect x="28"  y="128" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 2,1 — lit white (secondary) -->
  <rect x="78"  y="128" width="42" height="42" rx="8" fill="url(#glow_white)" filter="url(#shadow)" opacity="0.45"/>
  <!-- Pad 2,2 — idle -->
  <rect x="128" y="128" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 2,3 — idle -->
  <rect x="178" y="128" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>

  <!-- Row 3 -->
  <!-- Pad 3,0 — idle -->
  <rect x="28"  y="178" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 3,1 — idle -->
  <rect x="78"  y="178" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 3,2 — idle -->
  <rect x="128" y="178" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>
  <!-- Pad 3,3 — idle -->
  <rect x="178" y="178" width="42" height="42" rx="8" fill="url(#pad_idle)" filter="url(#shadow)"/>

  <!-- Pad number labels (small, subtle) — showing pad 6 number on active pad -->
  <text x="99" y="107" font-family="sans-serif" font-size="13" font-weight="bold"
        fill="#003300" text-anchor="middle" opacity="0.7">6</text>

  <!-- LED dot on active green pad -->
  <circle cx="99" cy="92" r="4" fill="#CCFF90" opacity="0.9"/>

  <!-- Touch ripple effect on active pad -->
  <circle cx="99" cy="99" r="18" fill="none" stroke="#A5D6A7" stroke-width="1.5" opacity="0.5"/>
  <circle cx="99" cy="99" r="23" fill="none" stroke="#C8E6C9" stroke-width="1"   opacity="0.25"/>
</svg>
